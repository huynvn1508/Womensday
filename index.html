<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Chúc mừng 8/3</title>

    <!-- Import Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff9ecf, #ffd6ea);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }


        .title {
            position: absolute;
            top: 50px;
            font-size: 50px;
            color: #e91e63;
            font-family: 'Dancing Script', cursive;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
            animation: floatText 3s ease-in-out infinite;
            z-index: 10;
        }


        @keyframes floatText {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0);
            }
        }


        .container {
            perspective: 1500px;
        }


        .card {
            width: 300px;
            height: 400px;
            position: relative;
            cursor: pointer;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }


        .card:hover {
            transform: translateY(-10px);
        }


        .card.open {
            transform: translateX(75px) translateY(-10px);
        }


        .card-cover {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transform-origin: left center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
            border-radius: 12px;
            box-shadow: -5px 5px 20px rgba(0, 0, 0, 0.15);
        }


        .card.open .card-cover {
            transform: rotateY(-140deg);
        }


        .cover-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-sizing: border-box;
        }

        .cover-front h2 {
            color: white;
            font-size: 28px;
            margin: 10px 0;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            z-index: 10;
            height: 40px;
            align-items: center;
            justify-content: center;
        }

        .btn {
            padding: 8px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            white-space: nowrap;
        }

        .open-btn {
            background: #fff;
            color: #e91e63;
        }

        .open-btn:hover {
            background: #ffe3ec;
            transform: scale(1.05);
        }

        .no-open-btn {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }


        .cover-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ffecf2;
            border-radius: 12px;
            transform: rotateY(180deg);
            backface-visibility: hidden;
            border: 1px solid #ffd6ea;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn {
            background: #ff4d88;
            color: white;
        }

        .close-btn:hover {
            background: #e6005c;
            transform: scale(1.05);
        }


        .card-inside {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            box-shadow: 5px 5px 20px rgba(0, 0, 0, 0.15);
            border: 1px solid #ffe3ec;
        }

        .message {
            text-align: center;
            font-size: 24px;
            color: #d81b60;
            line-height: 1.4;
            font-family: 'Dancing Script', cursive;
        }

        .flower {
            font-size: 60px;
            animation: pulse 2s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

        }


        #hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;

            pointer-events: none;

        }

        .floating-heart {
            position: absolute;
            color: #ff4d88;
            opacity: 0;
            transform-style: preserve-3d;
            animation: floatUp 8s linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotateY(0deg) scale(0.5);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            90% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-20vh) rotateY(360deg) scale(1.2);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div id="hearts-container"></div>

    <div class="title">
        💐 Happy Women's Day 💐
    </div>

    <div class="container" style="z-index: 10;">
        <div class="card">

            <div class="card-cover">
                <div class="cover-front">
                    <div class="flower">🌸</div>
                    <h2>Happy Women's Day</h2>
                    <div class="buttons">
                        <button class="btn open-btn" onclick="openCard(event)">💌 Mở</button>
                        <button class="btn no-open-btn" onclick="moveCard(event)">Không
                            mở</button>
                    </div>
                </div>
                <div class="cover-back">
                    <button class="btn close-btn" onclick="openCard(event)">Đóng thiệp</button>
                </div>
            </div>


            <div class="card-inside">
                <div class="message">
                    Chúc bạn một ngày 8/3 thật vui vẻ 🌸<br><br>
                    Luôn xinh đẹp, rạng rỡ, hạnh phúc và thành công!<br><br>
                    Cảm ơn bạn vì đã làm thế giới trở nên tuyệt vời hơn 💖
                </div>
            </div>
        </div>
    </div>

    <script>
        function openCard(event) {
            if (event) event.stopPropagation();
            document.querySelector(".card").classList.toggle("open");
        }

        function moveCard(event) {
            if (event) event.stopPropagation();
            const container = document.querySelector('.container');


            const maxX = window.innerWidth - 370;
            const maxY = window.innerHeight - 470;

            const x = Math.max(20, Math.random() * maxX);
            const y = Math.max(20, Math.random() * maxY);

            container.style.position = 'absolute';
            container.style.transition = 'all 0.3s ease';
            container.style.left = `${x}px`;
            container.style.top = `${y}px`;
        }


        function createHeart() {
            const container = document.getElementById('hearts-container');
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';

            // Randomize position, size, and duration
            const size = Math.random() * 20 + 10; // 10px to 30px
            const left = Math.random() * 100; // 0% to 100%
            const duration = Math.random() * 5 + 5; // 5s to 10s
            const delay = Math.random() * 5; // 0s to 5s

            heart.style.fontSize = `${size}px`;
            heart.style.left = `${left}vw`;
            heart.style.animationDuration = `${duration}s`;
            heart.style.animationDelay = `${delay}s`;


            const depth = Math.random() * 2 + 0.5;
            heart.style.transform = `scale(${depth})`;

            heart.style.opacity = Math.random() * 0.5 + 0.3;

            container.appendChild(heart);


            setTimeout(() => {
                heart.remove();
            }, (duration + delay) * 1000);
        }


        setInterval(createHeart, 300);


        for (let i = 0; i < 20; i++) {
            setTimeout(createHeart, Math.random() * 2000);
        }
    </script>

</body>

</html>
